<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Sun Gradient -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <!-- Cloud Gradient -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <!-- Cloud Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Background circle (sleek dark/glass representation for professional look) -->
  <rect width="128" height="128" rx="32" fill="#0f172a" />
  
  <!-- Glowing Sun -->
  <circle cx="82" cy="46" r="24" fill="url(#sunGrad)" />
  
  <!-- Cloud -->
  <path d="M46 90a22 22 0 0 1-6-43.18 26 26 0 0 1 50.78-4.8 18 18 0 0 1 15.22 17.72 22 22 0 0 1-22 22.26H46z" 
        fill="url(#cloudGrad)" 
        filter="url(#shadow)" />
</svg>